name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker images
      run: |
        docker build -t expense-backend:${{ github.sha }} -f Dockerfile.backend .
        docker build -t expense-frontend:${{ github.sha }} -f Dockerfile.frontend .
    
    - name: Push to registry
      run: |
        echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
        docker tag expense-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/expense-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/expense-backend:latest
        docker tag expense-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/expense-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/expense-frontend:latest
    
    - name: Deploy to AWS
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      run: |
        # Deploy backend
        aws ecs update-service --cluster production --service expense-api --force-new-deployment
        
        # Deploy frontend
        aws s3 sync frontend/build/ s3://${{ secrets.AWS_S3_BUCKET }}/