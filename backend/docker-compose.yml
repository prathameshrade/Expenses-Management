version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: expense_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: expense_management
      MYSQL_USER: expense_user
      MYSQL_PASSWORD: expense_password123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    container_name: expense_backend
    environment:
      DATABASE_URL: mysql+pymysql://expense_user:expense_password123@mysql:3306/expense_management
      SECRET_KEY: your-super-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  mysql_data: