services:
  mysql:
    image: mysql:8.0
    container_name: expense_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: expense_management
      MYSQL_USER: expense_user
      MYSQL_PASSWORD: expense_password123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - expense_network

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: expense_backend
    environment:
      DATABASE_URL: mysql+pymysql://expense_user:expense_password123@mysql:3306/expense_management
      SECRET_KEY: your-super-secret-key-change-in-production
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - expense_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: expense_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - expense_network

volumes:
  mysql_data:

networks:
  expense_network:
    driver: bridge